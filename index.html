<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple and beautiful currency converter to convert USD to INR.">
    <title>Premium Currency Converter</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="converter-container" id="converter-card">
        <h1>Currency Converter</h1>
        
        <div class="input-group">
            <label for="usdAmount">Amount in USD</label>
            <div class="input-wrapper">
                <span class="currency-symbol">$</span>
                <input type="number" id="usdAmount" placeholder="0.00" min="0" step="0.01">
            </div>
        </div>
        
        <button id="convertBtn">
            Convert to INR <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-left: 5px;"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
        
        <div id="resultDisplay" class="result">
            <span id="resultText">Enter amount to convert</span>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
